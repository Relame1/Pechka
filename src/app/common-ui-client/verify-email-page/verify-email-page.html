<div class="verify-page">
  <div class="verify-card">
    <div class="verify-icon">✉️</div>
    <h1>Подтверждение email</h1>
    <p>Код подтверждения отправлен на <strong>{{ email }}</strong></p>
    
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>
    
    <form (ngSubmit)="verifyCode()">
      <div class="form-group">
        <label>Введите код из письма</label>
        <input 
          type="text" 
          [(ngModel)]="code" 
          name="code"
          placeholder="000000"
          maxlength="6"
          class="code-input"
          autocomplete="off">
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Проверка...' : 'Подтвердить' }}
      </button>
    </form>
    
    <div class="resend-section">
      <p *ngIf="!isResending">
        Не пришёл код? 
        <a href="javascript:void(0)" (click)="resendCode()">Отправить снова</a>
      </p>
      <p *ngIf="isResending" class="resending">
        Отправка нового кода...
      </p>
      <p *ngIf="resendSuccess" class="resend-success">
        ✅ Новый код отправлен на вашу почту
      </p>
    </div>
  </div>
</div>
