<div class="modal-overlay" *ngIf="visible" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Настройка выпечки</h3>
    <p>Продукт: <strong>{{ productName }}</strong></p>
    <div class="form-group">
      <label>Температура (°C)</label>
      <input type="number" step="5" [(ngModel)]="temperature" min="50" max="350">
    </div>
    <div class="form-group">
      <label>Время (минут)</label>
      <input type="number" step="1" [(ngModel)]="timeMinutes" min="1" max="180">
    </div>
    <div class="modal-actions">
      <button class="primary-btn" (click)="onConfirm()">Начать выпечку</button>
      <button class="ghost-btn" (click)="onClose()">Отмена</button>
    </div>
  </div>
</div>
