    <!-- Правая часть — форма -->
    <div class="form-side">
      <div class="form-wrapper">
        
        <!-- Сообщения -->
        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
        <div *ngIf="successMessage" class="success-message">
          {{ successMessage }}
        </div>

        <!-- ФОРМА ВХОДА -->
        <div *ngIf="isLoginMode" class="form-content">
          <h1 class="welcome-title">Добро пожаловать!</h1>
          <p class="welcome-subtitle">Введите ваши данные для входа</p>

          <form 
            class="login-form" 
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()"
          >
            <label class="form-label">
              USERNAME ИЛИ EMAIL
              <input 
                formControlName="username"
                type="text" 
                class="form-input" 
                placeholder="@username или email@example.com"
                [class.invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
              <div class="error-hint" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
                Обязательное поле
              </div>
            </label>

            <label class="form-label">
              ПАРОЛЬ
              <div class="password-wrapper">
                <input 
                  formControlName="password"
                  [type]="showPassword ? 'text' : 'password'" 
                  class="form-input" 
                  placeholder="••••••••"
                  [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <button type="button" class="toggle-password" (click)="togglePassword()">
                  {{ showPassword ? '👁️‍🗨️' : '👁️' }}
                </button>
              </div>
              <div class="error-hint" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                Обязательное поле
              </div>
            </label>

            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox"> Запомнить меня
              </label>
              <a href="#" class="forgot-link">Забыли пароль?</a>
            </div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">
              {{ isLoading ? 'Вход...' : 'Войти' }}
            </button>

            <button type="button" class="btn-yandex" (click)="loginWithYandex()">
              <img src="/assets/imgs/yaorig.png" alt="Яндекс ID" class="yandex-icon">
              <span>Продолжить с Яндекс ID</span>
            </button>
          </form>

          <p class="toggle-link">
            Нет аккаунта? 
            <a href="javascript:void(0)" (click)="toggleMode()">Зарегистрироваться</a>
          </p>
        </div>

        <!-- ФОРМА РЕГИСТРАЦИИ -->
        <div *ngIf="!isLoginMode" class="form-content">
          <div class="register-container">
            <h1 class="welcome-title">Создание аккаунта</h1>
            <p class="welcome-subtitle">Заполните форму для регистрации</p>

            <form 
              class="register-form" 
              [formGroup]="registerForm"
              (ngSubmit)="onSubmit()"
            >
              <div class="form-fields">
                <label class="form-label">
                  ИМЯ *
                  <input 
                    formControlName="name"
                    type="text" 
                    class="form-input" 
                    placeholder="Введите ваше имя"
                    [class.invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                  <div class="error-hint" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                    <span *ngIf="registerForm.get('name')?.errors?.['required']">Имя обязательно</span>
                    <span *ngIf="registerForm.get('name')?.errors?.['minlength']">Минимум 2 символа</span>
                    <span *ngIf="registerForm.get('name')?.errors?.['maxlength']">Максимум 50 символов</span>
                  </div>
                </label>

                <label class="form-label">
                  EMAIL *
                  <input 
                    formControlName="email"
                    type="email" 
                    class="form-input" 
                    placeholder="example@mail.com"
                    [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                  <div class="error-hint" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                    <span *ngIf="registerForm.get('email')?.errors?.['required']">Email обязателен</span>
                    <span *ngIf="registerForm.get('email')?.errors?.['email']">Введите корректный email</span>
                  </div>
                </label>

                <label class="form-label">
                  ПАРОЛЬ *
                  <div class="password-wrapper">
                    <input 
                      formControlName="password"
                      [type]="showPassword ? 'text' : 'password'" 
                      class="form-input" 
                      placeholder="••••••••"
                      [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                    <button type="button" class="toggle-password" (click)="togglePassword()">
                      {{ showPassword ? '👁️‍🗨️' : '👁️' }}
                    </button>
                  </div>
                  <div class="error-hint" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                    <span *ngIf="registerForm.get('password')?.errors?.['required']">Пароль обязателен</span>
                    <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Минимум 6 символов</span>
                  </div>
                </label>

                <label class="form-label">
                  ПОДТВЕРЖДЕНИЕ ПАРОЛЯ *
                  <div class="password-wrapper">
                    <input 
                      formControlName="password_confirmation"
                      [type]="showConfirmPassword ? 'text' : 'password'" 
                      class="form-input" 
                      placeholder="••••••••"
                      [class.invalid]="registerForm.get('password_confirmation')?.invalid && registerForm.get('password_confirmation')?.touched">
                    <button type="button" class="toggle-password" (click)="toggleConfirmPassword()">
                      {{ showConfirmPassword ? '👁️‍🗨️' : '👁️' }}
                    </button>
                  </div>
                  <div class="error-hint" *ngIf="registerForm.hasError('mismatch') && registerForm.get('password_confirmation')?.touched">
                    Пароли не совпадают
                  </div>
                </label>
              </div>

              <button type="submit" class="btn-primary" [disabled]="isLoading">
                {{ isLoading ? 'Регистрация...' : 'Зарегистрироваться' }}
              </button>

              <button type="button" class="btn-yandex" (click)="loginWithYandex()">
                <img src="/assets/imgs/yaorig.png" alt="Яндекс ID" class="yandex-icon">
                <span>Продолжить с Яндекс ID</span>
              </button>
            </form>

            <p class="toggle-link">
              Уже есть аккаунт? 
              <a href="javascript:void(0)" (click)="toggleMode()">Войти</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
